<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow">Radii — 4 step rounding scale</p>
  <div style="display:flex; gap:10px; align-items:flex-end;">
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:#0A1929; border:1px solid #2A4F7A; border-radius:6px;"></div>
      <p style="margin:6px 0 0 0; font-size:11px; color:#94A3B8;">sm · 6px</p>
      <p style="margin:0; font-family:ui-monospace,Menlo,monospace; font-size:9px; color:#64748B;">tiny pills</p>
    </div>
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:#0A1929; border:1px solid #2A4F7A; border-radius:8px;"></div>
      <p style="margin:6px 0 0 0; font-size:11px; color:#94A3B8;">lg · 8px</p>
      <p style="margin:0; font-family:ui-monospace,Menlo,monospace; font-size:9px; color:#64748B;">buttons / inputs</p>
    </div>
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:#0A1929; border:1px solid #2A4F7A; border-radius:12px;"></div>
      <p style="margin:6px 0 0 0; font-size:11px; color:#94A3B8;">xl · 12px</p>
      <p style="margin:0; font-family:ui-monospace,Menlo,monospace; font-size:9px; color:#64748B;">cards / badges</p>
    </div>
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:#0A1929; border:1px solid #2A4F7A; border-radius:16px;"></div>
      <p style="margin:6px 0 0 0; font-size:11px; color:#94A3B8;">2xl · 16px</p>
      <p style="margin:0; font-family:ui-monospace,Menlo,monospace; font-size:9px; color:#64748B;">panels / hero</p>
    </div>
    <div style="text-align:center;">
      <div style="width:64px; height:64px; background:#0A1929; border:1px solid #2A4F7A; border-radius:9999px;"></div>
      <p style="margin:6px 0 0 0; font-size:11px; color:#94A3B8;">full</p>
      <p style="margin:0; font-family:ui-monospace,Menlo,monospace; font-size:9px; color:#64748B;">pills / dots</p>
    </div>
  </div>
</body></html>
