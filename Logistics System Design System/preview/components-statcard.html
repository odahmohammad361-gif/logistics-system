<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script></head>
<body style="font-family:'Inter',sans-serif;">
  <p class="eyebrow">Stat card — primary KPI tile (5 color variants)</p>
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
    <!-- green -->
    <div style="background:#0A1929; border:1px solid rgba(16,185,129,0.2); border-radius:12px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.4);">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;">
        <div style="width:40px; height:40px; border-radius:10px; background:rgba(16,185,129,.12); box-shadow:0 0 16px rgba(16,185,129,.2); display:flex; align-items:center; justify-content:center;">
          <i data-lucide="users" style="color:#10B981; width:18px; height:18px;"></i>
        </div>
        <span style="font-size:11px; font-weight:600; color:#10B981; background:rgba(16,185,129,.1); padding:2px 8px; border-radius:9999px;">+12%</span>
      </div>
      <p style="margin:0 0 4px 0; font-size:11px; font-weight:500; color:#94A3B8; letter-spacing:.05em; text-transform:uppercase;">Clients</p>
      <p style="margin:0; font-weight:900; font-size:28px; color:#F1F5F9; letter-spacing:-.02em; line-height:1; font-variant-numeric:tabular-nums;">2,847</p>
    </div>
    <!-- blue -->
    <div style="background:#0A1929; border:1px solid rgba(59,130,246,0.2); border-radius:12px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.4);">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;">
        <div style="width:40px; height:40px; border-radius:10px; background:rgba(59,130,246,.12); box-shadow:0 0 16px rgba(59,130,246,.2); display:flex; align-items:center; justify-content:center;">
          <i data-lucide="file-text" style="color:#3B82F6; width:18px; height:18px;"></i>
        </div>
      </div>
      <p style="margin:0 0 4px 0; font-size:11px; font-weight:500; color:#94A3B8; letter-spacing:.05em; text-transform:uppercase;">Invoices</p>
      <p style="margin:0; font-weight:900; font-size:28px; color:#F1F5F9; letter-spacing:-.02em; line-height:1; font-variant-numeric:tabular-nums;">643</p>
    </div>
    <!-- purple -->
    <div style="background:#0A1929; border:1px solid rgba(99,102,241,0.2); border-radius:12px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.4);">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;">
        <div style="width:40px; height:40px; border-radius:10px; background:rgba(99,102,241,.12); box-shadow:0 0 16px rgba(99,102,241,.2); display:flex; align-items:center; justify-content:center;">
          <i data-lucide="dollar-sign" style="color:#818CF8; width:18px; height:18px;"></i>
        </div>
      </div>
      <p style="margin:0 0 4px 0; font-size:11px; font-weight:500; color:#94A3B8; letter-spacing:.05em; text-transform:uppercase;">USD / JOD</p>
      <p style="margin:0; font-weight:900; font-size:28px; color:#F1F5F9; letter-spacing:-.02em; line-height:1; font-variant-numeric:tabular-nums;">0.709</p>
      <p style="margin:6px 0 0 0; font-size:10px; color:#475569;">Live rate</p>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
