<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:'Inter',sans-serif;font-weight:500;font-size:14px;padding:8px 16px;border-radius:8px;border:1px solid transparent;cursor:pointer;transition:all .2s;line-height:1;}
.btn-primary{background:#6366F1;color:#fff;box-shadow:0 1px 2px rgba(0,0,0,.3);}
.btn-primary:hover{background:#4F46E5;}
.btn-secondary{background:rgba(255,255,255,.05);color:#F1F5F9;border-color:#1E3A5F;}
.btn-secondary:hover{background:rgba(255,255,255,.1);border-color:#2A4F7A;}
.btn-danger{background:rgba(239,68,68,.1);color:#EF4444;border-color:rgba(239,68,68,.3);}
.btn-ghost{background:transparent;color:#94A3B8;}
.btn-ghost:hover{background:rgba(255,255,255,.05);color:#F1F5F9;}
.btn-sm{font-size:12px;padding:6px 12px;}
.btn-lg{font-size:16px;padding:10px 20px;}
</style></head>
<body>
  <p class="eyebrow">Buttons — 4 variants × 3 sizes</p>
  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
    <button class="btn btn-primary">Save</button>
    <button class="btn btn-secondary">Cancel</button>
    <button class="btn btn-danger">Delete</button>
    <button class="btn btn-ghost">Ghost</button>
  </div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:10px;">
    <button class="btn btn-primary btn-sm">Add Client</button>
    <button class="btn btn-primary">Save Changes</button>
    <button class="btn btn-primary btn-lg">Sign In</button>
  </div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:10px;">
    <button class="btn btn-primary" style="opacity:.4; cursor:not-allowed;">Disabled</button>
    <button class="btn btn-primary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/></svg>
      Loading
    </button>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body></html>
