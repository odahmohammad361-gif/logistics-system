<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow">Status — used in badges, icon cards, table cells</p>
  <div class="row" style="gap:10px;">
    <div class="swatch" style="background:#10B981; min-height:80px; color:#fff;"><span><div class="label">Green</div><div class="hex">#10B981</div></span><span class="hex">paid / cleared / delivered</span></div>
    <div class="swatch" style="background:#3B82F6; min-height:80px; color:#fff;"><span><div class="label">Blue</div><div class="hex">#3B82F6</div></span><span class="hex">sent / in-transit</span></div>
    <div class="swatch" style="background:#F59E0B; min-height:80px; color:#fff;"><span><div class="label">Amber</div><div class="hex">#F59E0B</div></span><span class="hex">booking / pending</span></div>
    <div class="swatch" style="background:#8B5CF6; min-height:80px; color:#fff;"><span><div class="label">Purple</div><div class="hex">#8B5CF6</div></span><span class="hex">arrived</span></div>
    <div class="swatch" style="background:#EF4444; min-height:80px; color:#fff;"><span><div class="label">Red</div><div class="hex">#EF4444</div></span><span class="hex">cancelled / rejected</span></div>
    <div class="swatch" style="background:#F97316; min-height:80px; color:#fff;"><span><div class="label">Orange</div><div class="hex">#F97316</div></span><span class="hex">expired</span></div>
  </div>
</body></html>
