# Production compose — no DB service (uses AWS Aurora PostgreSQL)
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
# Requirements:
#   - .env file with DATABASE_URL pointing to Aurora endpoint
#   - nginx/certs/ containing fullchain.pem + privkey.pem (for HTTPS)

services:

  # ── Build frontend static files ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api          # relative — nginx proxies /api/ to backend
    container_name: logistics_frontend_build
    volumes:
      - frontend_dist:/app/dist
    restart: "no"                   # runs once to build, then exits

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: logistics_backend
    restart: always
    env_file: .env
    environment:
      APP_ENV: production
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 4
        --proxy-headers
        --forwarded-allow-ips "*"
    depends_on:
      frontend:
        condition: service_completed_successfully

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: logistics_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro      # SSL certificates
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

volumes:
  frontend_dist:
  nginx_logs:
