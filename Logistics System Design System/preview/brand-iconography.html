<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
.icon-cell{background:#0A1929; border:1px solid #12263F; border-radius:10px; padding:14px 8px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:8px;}
.icon-cell .ic{color:#94A3B8; width:22px; height:22px; stroke-width:1.75;}
.icon-cell .nm{font-family:'Inter',sans-serif; font-size:10px; color:#64748B;}
</style></head>
<body>
  <p class="eyebrow">Iconography — Lucide · 1.75 stroke · 18–22px</p>
  <div style="display:grid; grid-template-columns:repeat(8, 1fr); gap:6px; margin-bottom:12px;">
    <div class="icon-cell"><i data-lucide="layout-dashboard" class="ic"></i><span class="nm">dashboard</span></div>
    <div class="icon-cell"><i data-lucide="users" class="ic"></i><span class="nm">clients</span></div>
    <div class="icon-cell"><i data-lucide="ship" class="ic"></i><span class="nm">container</span></div>
    <div class="icon-cell"><i data-lucide="plane" class="ic"></i><span class="nm">air</span></div>
    <div class="icon-cell"><i data-lucide="truck" class="ic"></i><span class="nm">delivery</span></div>
    <div class="icon-cell"><i data-lucide="file-text" class="ic"></i><span class="nm">invoice</span></div>
    <div class="icon-cell"><i data-lucide="dollar-sign" class="ic"></i><span class="nm">payment</span></div>
    <div class="icon-cell"><i data-lucide="globe" class="ic"></i><span class="nm">branch</span></div>
    <div class="icon-cell"><i data-lucide="package" class="ic"></i><span class="nm">parcel</span></div>
    <div class="icon-cell"><i data-lucide="map-pin" class="ic"></i><span class="nm">location</span></div>
    <div class="icon-cell"><i data-lucide="calendar" class="ic"></i><span class="nm">date</span></div>
    <div class="icon-cell"><i data-lucide="search" class="ic"></i><span class="nm">search</span></div>
    <div class="icon-cell"><i data-lucide="settings" class="ic"></i><span class="nm">settings</span></div>
    <div class="icon-cell"><i data-lucide="bell" class="ic"></i><span class="nm">bell</span></div>
    <div class="icon-cell"><i data-lucide="check" class="ic"></i><span class="nm">check</span></div>
    <div class="icon-cell"><i data-lucide="x" class="ic"></i><span class="nm">close</span></div>
  </div>
  <p style="margin:0 0 8px 0; font-size:10px; font-weight:600; color:#94A3B8; letter-spacing:.1em; text-transform:uppercase;">Tinted icon cards (KPI tiles use this pattern)</p>
  <div style="display:flex; gap:8px;">
    <div style="width:44px; height:44px; border-radius:10px; background:rgba(99,102,241,.12); box-shadow:0 0 16px rgba(99,102,241,.2); display:flex; align-items:center; justify-content:center;"><i data-lucide="users" style="color:#818CF8; width:20px; height:20px;"></i></div>
    <div style="width:44px; height:44px; border-radius:10px; background:rgba(16,185,129,.12); box-shadow:0 0 16px rgba(16,185,129,.2); display:flex; align-items:center; justify-content:center;"><i data-lucide="check" style="color:#10B981; width:20px; height:20px;"></i></div>
    <div style="width:44px; height:44px; border-radius:10px; background:rgba(245,158,11,.12); box-shadow:0 0 16px rgba(245,158,11,.2); display:flex; align-items:center; justify-content:center;"><i data-lucide="package" style="color:#F59E0B; width:20px; height:20px;"></i></div>
    <div style="width:44px; height:44px; border-radius:10px; background:rgba(239,68,68,.12); box-shadow:0 0 16px rgba(239,68,68,.2); display:flex; align-items:center; justify-content:center;"><i data-lucide="alert-triangle" style="color:#EF4444; width:20px; height:20px;"></i></div>
    <div style="width:44px; height:44px; border-radius:10px; background:rgba(59,130,246,.12); box-shadow:0 0 16px rgba(59,130,246,.2); display:flex; align-items:center; justify-content:center;"><i data-lucide="ship" style="color:#3B82F6; width:20px; height:20px;"></i></div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
