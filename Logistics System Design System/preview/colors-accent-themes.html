<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.theme-row { display:flex; align-items:center; gap:12px; padding:8px 12px; border-radius:10px; background:#0A1929; border:1px solid #12263F; margin-bottom:6px; }
.dot { width:22px; height:22px; border-radius:50%; flex-shrink:0; box-shadow:inset 0 1px 0 rgba(255,255,255,.2); }
.dot-row { display:flex; gap:6px; align-items:center; }
.dot-sm { width:14px; height:14px; border-radius:50%; }
.theme-name { font-size:12px; font-weight:600; color:#F1F5F9; flex:1; }
.theme-hex { font-family: ui-monospace,Menlo,monospace; font-size:10px; color:#64748B; }
</style></head>
<body>
  <p class="eyebrow">Accent themes — 8 swappable triads · backgrounds stay constant</p>
  <div>
    <div class="theme-row"><div class="dot" style="background:#6366F1;"></div><span class="theme-name">Indigo (default)</span><div class="dot-row"><div class="dot-sm" style="background:#4F46E5;"></div><div class="dot-sm" style="background:#818CF8;"></div></div><span class="theme-hex">#6366F1</span></div>
    <div class="theme-row"><div class="dot" style="background:#8B5CF6;"></div><span class="theme-name">Purple</span><div class="dot-row"><div class="dot-sm" style="background:#7C3AED;"></div><div class="dot-sm" style="background:#A78BFA;"></div></div><span class="theme-hex">#8B5CF6</span></div>
    <div class="theme-row"><div class="dot" style="background:#10B981;"></div><span class="theme-name">Emerald</span><div class="dot-row"><div class="dot-sm" style="background:#059669;"></div><div class="dot-sm" style="background:#34D399;"></div></div><span class="theme-hex">#10B981</span></div>
    <div class="theme-row"><div class="dot" style="background:#F43F5E;"></div><span class="theme-name">Rose</span><div class="dot-row"><div class="dot-sm" style="background:#E11D48;"></div><div class="dot-sm" style="background:#FB7185;"></div></div><span class="theme-hex">#F43F5E</span></div>
    <div class="theme-row"><div class="dot" style="background:#F59E0B;"></div><span class="theme-name">Amber</span><div class="dot-row"><div class="dot-sm" style="background:#D97706;"></div><div class="dot-sm" style="background:#FCD34D;"></div></div><span class="theme-hex">#F59E0B</span></div>
    <div class="theme-row"><div class="dot" style="background:#06B6D4;"></div><span class="theme-name">Cyan</span><div class="dot-row"><div class="dot-sm" style="background:#0891B2;"></div><div class="dot-sm" style="background:#22D3EE;"></div></div><span class="theme-hex">#06B6D4</span></div>
    <div class="theme-row"><div class="dot" style="background:#3B82F6;"></div><span class="theme-name">Blue</span><div class="dot-row"><div class="dot-sm" style="background:#2563EB;"></div><div class="dot-sm" style="background:#60A5FA;"></div></div><span class="theme-hex">#3B82F6</span></div>
    <div class="theme-row"><div class="dot" style="background:#14B8A6;"></div><span class="theme-name">Teal</span><div class="dot-row"><div class="dot-sm" style="background:#0D9488;"></div><div class="dot-sm" style="background:#2DD4BF;"></div></div><span class="theme-hex">#14B8A6</span></div>
  </div>
</body></html>
