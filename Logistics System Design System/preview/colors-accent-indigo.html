<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <p class="eyebrow">Accent — Indigo (default) · runtime-swappable triad</p>
  <div class="row">
    <div class="swatch" style="background:#4F46E5; min-height:108px; color:#fff;"><span><div class="label">Primary dark</div><div class="hex">#4F46E5</div></span><span class="hex">hover / press</span></div>
    <div class="swatch" style="background:#6366F1; min-height:108px; color:#fff;"><span><div class="label">Primary</div><div class="hex">#6366F1</div></span><span class="hex">--primary</span></div>
    <div class="swatch" style="background:#818CF8; min-height:108px; color:#fff;"><span><div class="label">Primary light</div><div class="hex">#818CF8</div></span><span class="hex">badges / active</span></div>
  </div>
  <div style="display:flex; align-items:center; gap:14px; margin-top:14px; padding:12px 14px; background:#0A1929; border:1px solid #12263F; border-radius:12px;">
    <div style="width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg,#6366F1,#818CF8); box-shadow:0 0 16px rgba(99,102,241,0.45); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:16px;">L</div>
    <div style="flex:1;">
      <div style="font-size:12px; color:#F1F5F9; font-weight:600;">Brand mark uses the primary→primary-light gradient</div>
      <div style="font-size:11px; color:#94A3B8; margin-top:2px;">linear-gradient(135deg, var(--primary), var(--primary-light))</div>
    </div>
  </div>
</body></html>
