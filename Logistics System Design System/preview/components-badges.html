<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:9999px;font-family:'Inter',sans-serif;font-weight:600;font-size:11px;border:1px solid;line-height:1.4;}
.b-paid{background:rgba(16,185,129,.15);color:#34D399;border-color:rgba(16,185,129,.25);}
.b-sent{background:rgba(59,130,246,.15);color:#93C5FD;border-color:rgba(59,130,246,.25);}
.b-booking{background:rgba(245,158,11,.15);color:#F59E0B;border-color:rgba(245,158,11,.25);}
.b-arrived{background:rgba(139,92,246,.15);color:#C4B5FD;border-color:rgba(139,92,246,.25);}
.b-cancelled{background:rgba(239,68,68,.15);color:#EF4444;border-color:rgba(239,68,68,.25);}
.b-draft{background:rgba(100,116,139,.2);color:#94A3B8;border-color:rgba(100,116,139,.2);}
.b-active{background:rgba(16,185,129,.15);color:#10B981;border-color:rgba(16,185,129,.25);}
.b-expired{background:rgba(249,115,22,.15);color:#FB923C;border-color:rgba(249,115,22,.25);}
.b-indigo{background:rgba(99,102,241,.15);color:#A5B4FC;border-color:rgba(99,102,241,.25);}
</style></head>
<body>
  <p class="eyebrow">Badges — status pills (universal recipe: bg/15 + border/25)</p>
  <p style="margin:0 0 6px 0; font-size:10px; font-weight:600; color:#94A3B8; letter-spacing:.05em; text-transform:uppercase;">Invoice</p>
  <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;">
    <span class="badge b-draft">draft</span>
    <span class="badge b-sent">sent</span>
    <span class="badge b-paid">approved</span>
    <span class="badge b-paid">paid</span>
    <span class="badge b-cancelled">cancelled</span>
  </div>
  <p style="margin:0 0 6px 0; font-size:10px; font-weight:600; color:#94A3B8; letter-spacing:.05em; text-transform:uppercase;">Container</p>
  <div style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;">
    <span class="badge b-booking">booking</span>
    <span class="badge b-sent">in_transit</span>
    <span class="badge b-arrived">arrived</span>
    <span class="badge b-paid">cleared</span>
    <span class="badge b-paid">delivered</span>
  </div>
  <p style="margin:0 0 6px 0; font-size:10px; font-weight:600; color:#94A3B8; letter-spacing:.05em; text-transform:uppercase;">Quote / branch</p>
  <div style="display:flex; gap:6px; flex-wrap:wrap;">
    <span class="badge b-active">active</span>
    <span class="badge b-expired">expired</span>
    <span class="badge b-cancelled">rejected</span>
    <span class="badge b-indigo">JO</span>
    <span class="badge b-indigo">CN</span>
    <span class="badge b-indigo">IQ</span>
  </div>
</body></html>
