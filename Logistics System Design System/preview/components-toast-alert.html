<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"></head>
<body>
  <p class="eyebrow">Toast & alert — overlay feedback (4 tones)</p>
  <div style="display:flex; flex-direction:column; gap:8px;">
    <div style="display:flex; align-items:flex-start; gap:12px; background:#0A1929; border:1px solid rgba(16,185,129,.3); border-left:3px solid #10B981; border-radius:8px; padding:12px 14px; box-shadow:0 4px 12px rgba(0,0,0,.3);">
      <div style="width:20px; height:20px; border-radius:9999px; background:rgba(16,185,129,.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px;">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="flex:1;">
        <p style="margin:0; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; color:#F1F5F9;">Invoice INV-2026-0142 saved</p>
        <p style="margin:2px 0 0 0; font-size:12px; color:#94A3B8;">Sent to حسام للتجارة</p>
      </div>
    </div>
    <div style="display:flex; align-items:flex-start; gap:12px; background:#0A1929; border:1px solid rgba(245,158,11,.3); border-left:3px solid #F59E0B; border-radius:8px; padding:12px 14px;">
      <div style="width:20px; height:20px; border-radius:9999px; background:rgba(245,158,11,.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; font-weight:900; color:#F59E0B; font-size:13px;">!</div>
      <div style="flex:1;">
        <p style="margin:0; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; color:#F1F5F9;">Container approaching ETA</p>
        <p style="margin:2px 0 0 0; font-size:12px; color:#94A3B8;">SEA-2026-0001 arrives Aqaba in 2 days</p>
      </div>
    </div>
    <div style="display:flex; align-items:flex-start; gap:12px; background:#0A1929; border:1px solid rgba(239,68,68,.3); border-left:3px solid #EF4444; border-radius:8px; padding:12px 14px;">
      <div style="width:20px; height:20px; border-radius:9999px; background:rgba(239,68,68,.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; font-weight:900; color:#EF4444; font-size:13px;">×</div>
      <div style="flex:1;">
        <p style="margin:0; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; color:#F1F5F9;">Failed to send WhatsApp</p>
        <p style="margin:2px 0 0 0; font-size:12px; color:#94A3B8;">Retry queued in 30s</p>
      </div>
    </div>
    <div style="display:flex; align-items:flex-start; gap:12px; background:#0A1929; border:1px solid rgba(99,102,241,.3); border-left:3px solid #6366F1; border-radius:8px; padding:12px 14px;">
      <div style="width:20px; height:20px; border-radius:9999px; background:rgba(99,102,241,.2); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; font-weight:900; color:#A5B4FC; font-size:11px;">i</div>
      <div style="flex:1;">
        <p style="margin:0; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; color:#F1F5F9;">Exchange rate updated</p>
        <p style="margin:2px 0 0 0; font-size:12px; color:#94A3B8;">USD → JOD now 0.709</p>
      </div>
    </div>
  </div>
</body></html>
