<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
.nav-item{display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:8px; font-family:'Inter',sans-serif; font-size:13px; font-weight:500; color:#94A3B8; cursor:pointer; transition:all .15s;}
.nav-item:hover{background:rgba(255,255,255,.04); color:#F1F5F9;}
.nav-item.active{background:rgba(99,102,241,.12); color:#A5B4FC; box-shadow:inset 2px 0 0 #6366F1;}
.nav-item .ic{width:18px; height:18px; flex-shrink:0;}
.section-label{font-size:10px; font-weight:600; color:#475569; letter-spacing:.12em; text-transform:uppercase; padding:14px 14px 6px; margin:0;}
</style></head>
<body>
  <p class="eyebrow">Sidebar nav — collapsible · active state has indigo bar</p>
  <div style="display:grid; grid-template-columns:240px 1fr; gap:0; background:#040D1A; border:1px solid #12263F; border-radius:12px; overflow:hidden; min-height:340px;">
    <div style="padding:16px 10px; border-right:1px solid #12263F;">
      <div style="display:flex; align-items:center; gap:10px; padding:6px 8px 16px; border-bottom:1px solid rgba(30,58,95,.5); margin-bottom:8px;">
        <div style="width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#6366F1,#818CF8); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:13px;">L</div>
        <div>
          <div style="font-family:'Inter',sans-serif; font-weight:700; font-size:13px; color:#F1F5F9; line-height:1.2;">Logistics</div>
          <div style="font-size:10px; color:#64748B;">v1.4 · Admin</div>
        </div>
      </div>
      <div class="nav-item active"><i data-lucide="layout-dashboard" class="ic"></i>Dashboard</div>
      <div class="nav-item"><i data-lucide="users" class="ic"></i>Clients <span style="margin-left:auto; font-size:10px; color:#64748B; font-variant-numeric:tabular-nums;">2.8k</span></div>
      <div class="nav-item"><i data-lucide="ship" class="ic"></i>Containers</div>
      <div class="nav-item"><i data-lucide="file-text" class="ic"></i>Invoices <span style="margin-left:auto; padding:2px 6px; border-radius:9999px; background:#6366F1; color:#fff; font-size:10px; font-weight:700;">3</span></div>
      <p class="section-label">CONFIG</p>
      <div class="nav-item"><i data-lucide="globe" class="ic"></i>Branches</div>
      <div class="nav-item"><i data-lucide="settings" class="ic"></i>Settings</div>
    </div>
    <div style="padding:24px;">
      <p style="margin:0 0 4px 0; font-size:11px; font-weight:600; color:#64748B; letter-spacing:.05em; text-transform:uppercase;">Dashboard</p>
      <h2 style="margin:0; font-family:'Inter',sans-serif; font-weight:900; font-size:24px; color:#F1F5F9; letter-spacing:-.02em;">Overview</h2>
      <p style="margin:6px 0 0 0; font-size:13px; color:#94A3B8;">Active page · Tuesday, Apr 24</p>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
