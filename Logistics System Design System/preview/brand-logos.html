<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet"></head>
<body>
  <p class="eyebrow">Brand marks — admin (gradient L) · shop (bag glyph)</p>
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
    <div style="background:#0A1929; border:1px solid #12263F; border-radius:12px; padding:20px; text-align:center;">
      <img src="../assets/logo-admin.svg" alt="" style="width:72px; height:72px; display:block; margin:0 auto 12px;"/>
      <p style="margin:0; font-family:'Inter',sans-serif; font-weight:700; font-size:13px; color:#F1F5F9;">Admin / dashboard</p>
      <p style="margin:2px 0 0 0; font-size:11px; color:#94A3B8;">gradient L · indigo glow</p>
    </div>
    <div style="background:#0A1929; border:1px solid #12263F; border-radius:12px; padding:20px; text-align:center;">
      <img src="../assets/logo-shop.svg" alt="" style="width:72px; height:72px; display:block; margin:0 auto 12px;"/>
      <p style="margin:0; font-family:'Inter',sans-serif; font-weight:700; font-size:13px; color:#F1F5F9;">Shop / customer</p>
      <p style="margin:2px 0 0 0; font-size:11px; color:#94A3B8;">shopping bag · same gradient</p>
    </div>
  </div>
  <div style="margin-top:10px; background:#0A1929; border:1px solid #12263F; border-radius:12px; padding:14px 16px; display:flex; gap:14px; align-items:center;">
    <div style="display:flex; align-items:center; gap:10px;">
      <div style="width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#6366F1,#818CF8); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:14px;">L</div>
      <div>
        <div style="font-family:'Inter',sans-serif; font-weight:700; font-size:13px; color:#F1F5F9; line-height:1.1;">Logistics</div>
        <div style="font-size:10px; color:#64748B;">Admin · v1.4</div>
      </div>
    </div>
    <div style="height:32px; width:1px; background:#1E3A5F;"></div>
    <p style="margin:0; font-size:11px; color:#94A3B8; line-height:1.4;">Lockup — used in sidebar header & login screens</p>
  </div>
</body></html>
